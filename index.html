<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DND 角色广场</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a0033; font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: scale(1.03); box-shadow: 0 0 25px #a855f7; }
    .tag { transition: all 0.2s; }
    .modal-content { max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body class="text-white min-h-screen pb-20 bg-[#1a0033]">
  <div class="max-w-2xl mx-auto p-4 sm:p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl sm:text-4xl font-bold flex items-center gap-3">
        DND 剧本杀 
        <span class="text-xs bg-[#a855f7] px-4 py-1 rounded-full">角色广场</span>
      </h1>
      <button onclick="showModal()" 
              class="bg-[#a855f7] hover:bg-[#9333ea] px-6 sm:px-8 py-3 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">
        + 新建角色卡
      </button>
    </div>

    <!-- 搜索 + 标签过滤 -->
    <input id="searchInput" onkeyup="if(event.key==='Enter') filterRoles()" placeholder="搜索角色名称..." 
           class="w-full bg-[#2a0044] border border-white/10 rounded-2xl px-5 py-4 text-lg mb-4 focus:outline-none focus:border-[#a855f7]">

    <div id="tagFilters" class="flex flex-wrap gap-2 mb-6"></div>

    <div id="rolesGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- 创建/编辑弹窗 -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4" onclick="if(event.target.id==='modal') hideModal()">
    <div class="modal-content bg-[#2a0044] w-full max-w-lg mx-auto rounded-3xl p-6" onclick="event.stopImmediatePropagation()">
      <h2 id="modalTitle" class="text-2xl font-bold mb-6">新建角色卡</h2>
      
      <input id="cardName" placeholder="角色名称（必填）" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-4 text-lg">
      
      <!-- 标签 -->
      <div class="mb-4">
        <div class="flex gap-2">
          <input id="tagInput" placeholder="输入标签后回车或点击添加" 
                 class="flex-1 bg-[#1a0033] rounded-2xl px-5 py-4 text-lg" onkeydown="if(event.key==='Enter') addTag()">
          <button onclick="addTag()" class="bg-[#a855f7] px-6 rounded-2xl font-bold">添加</button>
        </div>
        <div id="tagChips" class="flex flex-wrap gap-2 mt-3"></div>
      </div>

      <textarea id="personality" rows="3" placeholder="人物性格（例如：外向、腹黑、温柔...）" 
                class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-4 resize-none"></textarea>
      
      <textarea id="background" rows="4" placeholder="背景故事（越详细越好）" 
                class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-4 resize-none"></textarea>
      
      <textarea id="systemPrompt" rows="5" placeholder="完整系统提示词（可选，可不填）" 
                class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 resize-none"></textarea>

      <div class="flex gap-3 mt-8">
        <button onclick="hideModal()" class="flex-1 py-4 rounded-2xl border border-white/30 text-white/80 active:bg-white/10">取消</button>
        <button onclick="saveCard()" id="saveBtn" class="flex-1 py-4 bg-[#a855f7] rounded-2xl font-bold active:scale-95">保存</button>
      </div>
      
      <!-- 删除按钮（仅编辑模式显示） -->
      <button onclick="deleteCard()" id="deleteBtn" 
              class="hidden mt-4 w-full py-4 text-red-400 border border-red-400/50 rounded-2xl hover:bg-red-400/10">🗑 删除这张角色卡</button>
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand(); tg.setHeaderColor("#1a0033"); tg.setBackgroundColor("#1a0033");

  const tgUser = tg.initDataUnsafe?.user;
  const userId = tgUser ? tgUser.id : 123456;

  const SUPABASE_URL = "https://pttzjqrdsgjygglkhvot.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_klCt2wEdrNWEflRnLENNNg_gGYJfs3C";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentEditId = null;
  let selectedFilterTags = [];
  let allCards = [];

  async function loadRoles() {
    const { data, error } = await supabaseClient
      .from('role_cards')
      .select('*')
      .eq('owner_id', userId)
      .order('id', { ascending: false });

    if (error) return console.error(error);
    allCards = data || [];
    renderFilterTags();
    filterRoles();
  }

  function renderFilterTags() {
    const container = document.getElementById('tagFilters');
    const allTags = [...new Set(allCards.flatMap(c => c.tags || []))].sort();
    container.innerHTML = allTags.length ? 
      `<div class="text-sm text-white/60 mb-1">标签过滤：</div>` + 
      allTags.map(tag => `
        <span onclick="toggleFilterTag('${tag}')" 
              class="tag inline-block px-4 py-1 bg-[#3a0055] hover:bg-[#a855f7] text-sm rounded-3xl cursor-pointer ${selectedFilterTags.includes(tag) ? 'bg-[#a855f7] text-white' : ''}">
          #${tag}
        </span>`).join('') : '';
  }

  function toggleFilterTag(tag) {
    if (selectedFilterTags.includes(tag)) {
      selectedFilterTags = selectedFilterTags.filter(t => t !== tag);
    } else {
      selectedFilterTags.push(tag);
    }
    filterRoles();
    renderFilterTags();
  }

  function filterRoles() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = allCards;

    if (search) {
      filtered = filtered.filter(c => c.name.toLowerCase().includes(search));
    }
    if (selectedFilterTags.length > 0) {
      filtered = filtered.filter(c => {
        const cardTags = c.tags || [];
        return selectedFilterTags.some(t => cardTags.includes(t));
      });
    }

    renderCards(filtered);
  }

  function renderCards(cards) {
    const grid = document.getElementById('rolesGrid');
    if (!cards.length) {
      grid.innerHTML = `<div class="col-span-full text-center py-12 text-white/50">没有找到匹配的角色卡～</div>`;
      return;
    }
    grid.innerHTML = cards.map(card => `
      <div onclick="editCard(${card.id})" class="card bg-[#2a0044] rounded-3xl overflow-hidden p-5 cursor-pointer">
        <div class="flex justify-between items-start">
          <div class="font-bold text-xl mb-2">${card.name}</div>
        </div>
        ${card.tags && card.tags.length ? `<div class="flex flex-wrap gap-1 mb-3">${card.tags.map(t=>`<span class="text-xs bg-[#a855f7]/20 text-[#a855f7] px-3 py-0.5 rounded-3xl">#${t}</span>`).join('')}</div>` : ''}
        ${card.personality ? `<div class="text-sm text-white/70 mb-1">性格：${card.personality.substring(0,40)}...</div>` : ''}
        ${card.background ? `<div class="text-xs text-white/50 line-clamp-2">${card.background.substring(0,80)}...</div>` : ''}
      </div>
    `).join('');
  }

  function showModal(isEdit = false) {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalTitle').textContent = isEdit ? '编辑角色卡' : '新建角色卡';
    document.getElementById('deleteBtn').classList.toggle('hidden', !isEdit);
    document.getElementById('saveBtn').textContent = isEdit ? '保存修改' : '创建角色卡';
    
    // 清空标签芯片
    document.getElementById('tagChips').innerHTML = '';
  }

  function hideModal() {
    document.getElementById('modal').classList.add('hidden');
    currentEditId = null;
    // 清空表单
    ['cardName','personality','background','systemPrompt','tagInput'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('tagChips').innerHTML = '';
  }

  let currentTags = [];
  function addTag() {
    const input = document.getElementById('tagInput');
    const val = input.value.trim();
    if (!val) return;
    if (!currentTags.includes(val)) {
      currentTags.push(val);
      renderChips();
    }
    input.value = '';
  }

  function renderChips() {
    const container = document.getElementById('tagChips');
    container.innerHTML = currentTags.map((tag, i) => `
      <span class="inline-flex items-center bg-[#a855f7] text-white text-sm px-4 py-1 rounded-3xl">
        #${tag}
        <span onclick="removeTag(${i});event.stopImmediatePropagation()" class="ml-2 cursor-pointer text-xs">✕</span>
      </span>`).join('');
  }

  window.removeTag = function(i) {
    currentTags.splice(i, 1);
    renderChips();
  };

  async function saveCard() {
    const name = document.getElementById('cardName').value.trim();
    if (!name) return alert("角色名称不能为空！");

    const payload = {
      owner_id: userId,
      name: name,
      tags: currentTags,
      personality: document.getElementById('personality').value.trim(),
      background: document.getElementById('background').value.trim(),
      system_prompt: document.getElementById('systemPrompt').value.trim() || null
    };

    let error;
    if (currentEditId) {
      ({ error } = await supabaseClient.from('role_cards').update(payload).eq('id', currentEditId));
    } else {
      ({ error } = await supabaseClient.from('role_cards').insert(payload));
    }

    if (error) {
      alert("保存失败: " + error.message);
    } else {
      alert(currentEditId ? "✅ 修改成功！" : "✅ 创建成功！");
      hideModal();
      loadRoles();
    }
  }

  function editCard(id) {
    const card = allCards.find(c => c.id === id);
    if (!card) return;

    currentEditId = id;
    currentTags = card.tags || [];

    document.getElementById('cardName').value = card.name || '';
    document.getElementById('personality').value = card.personality || '';
    document.getElementById('background').value = card.background || '';
    document.getElementById('systemPrompt').value = card.system_prompt || '';

    showModal(true);
    renderChips();
  }

  async function deleteCard() {
    if (!currentEditId) return;
    if (!confirm("确定要删除这张角色卡吗？此操作不可恢复！")) return;

    const { error } = await supabaseClient.from('role_cards').delete().eq('id', currentEditId);
    if (error) {
      alert("删除失败: " + error.message);
    } else {
      alert("🗑 删除成功！");
      hideModal();
      loadRoles();
    }
  }

  // 页面加载
  window.onload = loadRoles;
</script>
</body>
</html>
