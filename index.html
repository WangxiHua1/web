<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 陪聊</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    
    :root {
      --tw-color-primary: #ec4899;
    }
    
    body {
      background: linear-gradient(180deg, #fdf4f8 0%, #f8f0f5 100%);
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      color: #3f2a4a;
    }
    
    .header-notice {
      background: #fff1f2;
      color: #9f1239;
      font-size: 13px;
      padding: 6px 0;
      text-align: center;
      border-bottom: 1px solid #fce7f3;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.08);
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .chat-bubble {
      max-width: 78%;
      padding: 12px 18px;
      border-radius: 20px;
      position: relative;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    
    .ai-bubble { background: #fff; border-bottom-left-radius: 4px; color: #3f2a4a; }
    .user-bubble { background: #fce7f3; border-bottom-right-radius: 4px; color: #3f2a4a; margin-left: auto; }
    
    .action-text { color: #9f1239; font-style: italic; font-size: 14px; display: block; margin-bottom: 4px; }
    
    .favorability {
      font-size: 13px;
      padding: 2px 10px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 6px;
    }
    .favorability-positive { background: #ecfdf5; color: #10b981; }
    .favorability-negative { background: #fef2f2; color: #ef4444; }
    
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 9999px; background: #fce7f3; color: #9f1239; }
    .nsfw-tag { background: #ec4899; color: white; }
    
    .bottom-nav {
      background: white;
      border-top: 1px solid #fce7f3;
      box-shadow: 0 -2px 8px rgba(236, 72, 153, 0.1);
    }
    
    .modal {
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen pb-20 text-[#3f2a4a]">


    <!-- TAB 导航 -->
    <div class="flex justify-around text-sm font-medium py-3 border-b border-[#fce7f3]">
      <button onclick="switchTab(0)" class="tab-btn flex-1 flex flex-col items-center active"><span class="text-xl">🏠</span><span class="text-xs">发现</span></button>
      <button onclick="switchTab(1)" class="tab-btn flex-1 flex flex-col items-center"><span class="text-xl">💬</span><span class="text-xs">聊天</span></button>
      <button onclick="switchTab(2)" class="tab-btn flex-1 flex flex-col items-center"><span class="text-xl">✍️</span><span class="text-xs">创作</span></button>
      <button onclick="switchTab(3)" class="tab-btn flex-1 flex flex-col items-center"><span class="text-xl">📸</span><span class="text-xs">相册</span></button>
      <button onclick="switchTab(4)" class="tab-btn flex-1 flex flex-col items-center"><span class="text-xl">👤</span><span class="text-xs">我的</span></button>
    </div>

    <!-- ==================== 发现页 ==================== -->
    <div id="tab-0" class="tab-page px-4 py-6">
      <div class="bg-white flex items-center px-5 py-3 rounded-3xl shadow-sm border border-[#fce7f3] mb-6">
        <input id="searchInput" type="text" placeholder="搜索角色 / 标签 / 关键词" class="flex-1 bg-transparent outline-none text-sm placeholder-[#c026d3]/40" onkeyup="if(event.key==='Enter') filterCharacters()">
        <button onclick="filterCharacters()" class="text-[#ec4899] text-2xl">🔍</button>
      </div>

      <!-- 标签筛选 -->
      <div class="flex flex-wrap gap-2 mb-6" id="tagFilters"></div>

      <!-- 角色卡网格 -->
      <div class="grid grid-cols-2 gap-4" id="characterGrid"></div>
    </div>

    <!-- ==================== 聊天页 ==================== -->
    <div id="tab-1" class="tab-page hidden flex flex-col h-[calc(100vh-140px)]">
      <div class="bg-white mx-3 mt-3 rounded-3xl shadow-sm px-4 py-3 flex items-center gap-4">
        <div class="bg-[#fff1f2] text-[#9f1239] font-semibold text-xl w-11 h-11 flex items-center justify-center rounded-2xl flex-shrink-0">00:47</div>
        <div class="flex-1">
          <div class="flex justify-between text-sm">
          </div>
          <div class="flex justify-between items-center mt-1">
            <div class="flex items-center gap-1 text-[#ec4899]">💎 <span id="diamond-balance" class="font-semibold">000</span></div>
          </div>
        </div>
      </div>

      <div class="chat-header px-4 py-3 flex items-center gap-3 border-b border-[#fce7f3]">
        <div class="w-9 h-9 rounded-2xl overflow-hidden flex-shrink-0 border-2 border-[#ec4899]">
          <img id="character-avatar" src="https://picsum.photos/id/1011/128/128" class="w-full h-full object-cover">
        </div>
        <div class="flex-1">
          <div id="chat-title" class="font-semibold text-xl flex items-center gap-2"></div>
          <div class="flex items-center gap-2 text-xs">
            <span id="chat-level-badge" class="px-3 py-px bg-[#ecfdf5] text-[#10b981] rounded-3xl font-medium"></span>
            <span id="chat-type-badge" class="text-[#ec4899]"></span>
          </div>
        </div>
        <button onclick="collapseChat()" class="bg-[#f8f0f5] text-[#9f1239] px-5 py-1.5 rounded-3xl text-sm">收起</button>
        <button onclick="endDialog()" class="bg-white border border-[#fce7f3] text-[#9f1239] px-5 py-1.5 rounded-3xl text-sm">结束对话</button>
      </div>

      <div id="chatMessages" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 bg-[radial-gradient(#fdf4f8_1px,#f8f0f5_1px)] bg-[length:20px_20px]"></div>

      <div class="px-4 py-3 bg-white border-t border-[#fce7f3] flex items-center gap-3">
        <button onclick="showImageGenerateModal()" class="text-3xl">🖼️</button>
        <button onclick="showGiftModal()" class="text-3xl">🎁</button>
        <input id="chatInput" type="text" placeholder="输入你想说的话..." class="flex-1 bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none text-sm" onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="w-11 h-11 bg-[#ec4899] rounded-3xl text-white flex items-center justify-center">➤</button>
      </div>
    </div>

    <!-- ==================== 创作页 ==================== -->
    <div id="tab-2" class="tab-page hidden px-4 py-6">
      <h2 class="text-2xl font-bold mb-6">创建新人物卡 / 剧本</h2>
      
      <div class="bg-white rounded-3xl shadow-sm p-6 space-y-6">
        <div>
          <div class="text-xs text-[#9f1239] mb-2">角色名字（必填）</div>
          <input id="aiRoleName" type="text" placeholder="Yuki" class="w-full bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none">
        </div>

        <div class="flex gap-4">
          <div class="flex-1">
            <div class="text-xs text-[#9f1239] mb-2">AI类型</div>
            <div class="flex gap-2">
              <button onclick="selectType(this, '养成')" class="type-btn flex-1 bg-[#f8f0f5] py-4 rounded-3xl font-medium active">养成系统</button>
              <button onclick="selectType(this, '剧本')" class="type-btn flex-1 bg-[#f8f0f5] py-4 rounded-3xl font-medium">剧本系统</button>
            </div>
          </div>
          <div class="flex-1">
            <div class="text-xs text-[#9f1239] mb-2">智能等级 (1-5)</div>
            <select id="aiLevel" class="w-full bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none">
              <option value="1">1 - 基础</option>
              <option value="2">2 - 普通</option>
              <option value="3" selected>3 - 聪明</option>
              <option value="4">4 - 高级</option>
              <option value="5">5 - 顶级智能</option>
            </select>
          </div>
        </div>

        <!-- NSFW + 性癖 -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3"><span>NSFW</span>
            <label class="relative inline-flex cursor-pointer"><input type="checkbox" id="nsfwToggle" onchange="toggleNSFW()" class="sr-only peer"><div class="w-11 h-6 bg-[#e2d4f0] peer-focus:ring-4 peer-focus:ring-[#ec4899] rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#ec4899]"></div></label>
          </div>
          <span id="nsfwStatus" class="text-xs text-[#9f1239]">关闭</span>
        </div>
        <div id="fetishSection" class="hidden">
          <div class="text-xs text-[#9f1239] mb-2">性癖（多个用逗号分隔）</div>
          <input id="fetishInput" type="text" placeholder="轻SM、足控、反差、母子..." class="w-full bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none">
        </div>

        <!-- 标签 -->
        <div>
          <div class="text-xs text-[#9f1239] mb-2">标签（多个用逗号分隔）</div>
          <input id="tagsInput" type="text" placeholder="妹妹、校园、日常..." class="w-full bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none">
        </div>

        <!-- 隐私设置 -->
        <div class="flex items-center justify-between">
          <span>是否公开（别人可查看/收藏）</span>
          <label class="relative inline-flex cursor-pointer"><input type="checkbox" id="publicToggle" checked class="sr-only peer"><div class="w-11 h-6 bg-[#e2d4f0] peer-focus:ring-4 peer-focus:ring-[#ec4899] rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#ec4899]"></div></label>
        </div>

        <div>
          <div class="text-xs text-[#9f1239]">角色定义 / 剧本描述</div>
          <textarea id="appearance" rows="4" class="w-full bg-[#f8f0f5] rounded-3xl px-6 py-4 outline-none resize-none">身高165cm，长相甜美，穿着高中校服，性格害羞黏人</textarea>
        </div>

        <button onclick="createCharacter()" class="w-full bg-[#ec4899] text-white py-5 rounded-3xl text-xl font-semibold">提交创建</button>
      </div>
    </div>

    <!-- ==================== 相册页 ==================== -->
    <div id="tab-3" class="tab-page hidden px-4 py-6">
      <h2 class="text-2xl font-bold mb-6">📸 所有生成图片</h2>
      <div id="albumGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- ==================== 我的页 ==================== -->
    <div id="tab-4" class="tab-page hidden px-4 py-6">
      <h2 class="text-2xl font-bold mb-6">👤 我的</h2>
      <div class="bg-white rounded-3xl p-6 space-y-6">
        <div class="flex justify-between items-center">
          <span class="text-lg">剩余钻石</span>
          <span id="my-diamond" class="text-4xl font-bold text-[#ec4899]">000</span>
        </div>
        <button onclick="showRedeemModal()" class="w-full bg-[#ec4899] text-white py-4 rounded-3xl">卡密充值</button>
        <button onclick="showDMModal()" class="w-full bg-white border border-[#ec4899] text-[#ec4899] py-4 rounded-3xl">DM 赠送 / 管理</button>
        
        <div class="pt-4">
          <h3 class="text-lg font-semibold mb-3">我的收藏</h3>
          <div id="myFavorites" class="grid grid-cols-2 gap-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav fixed bottom-0 left-0 right-0 max-w-2xl mx-auto flex justify-around py-2 text-xs font-medium">
    <button onclick="switchTab(0)" class="flex-1 flex flex-col items-center text-[#ec4899]">🏠 发现</button>
    <button onclick="switchTab(1)" class="flex-1 flex flex-col items-center">💬 聊天</button>
    <button onclick="switchTab(2)" class="flex-1 flex flex-col items-center">✍️ 创作</button>
    <button onclick="switchTab(3)" class="flex-1 flex flex-col items-center">📸 相册</button>
    <button onclick="switchTab(4)" class="flex-1 flex flex-col items-center">👤 我的</button>
  </div>

  <!-- 全局模态框容器 -->
  <div id="modalContainer" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50"></div>

  <script>
    // ==================== 全局数据（模拟 Supabase） ====================
    let characters = JSON.parse(localStorage.getItem('characters')) || [];
    let userFavorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let generatedImages = JSON.parse(localStorage.getItem('generatedImages')) || [];
    let diamondBalance = parseInt(localStorage.getItem('diamondBalance')) || 5760;
    let currentChat = null;
    let messagesHistory = [];

    // ==================== Tailwind 初始化 ====================
    function initTailwind() {
      tailwind.config = { theme: { extend: { colors: { primary: '#ec4899' } } } };
    }

    // ==================== Tab 切换 ====================
    function switchTab(n) {
      document.querySelectorAll('.tab-page').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${n}`).classList.remove('hidden');
      if (n === 4) renderMyPage();
    }

    // ==================== 发现页 - 渲染角色卡 ====================
    function renderCharacterGrid(filtered = null) {
      const grid = document.getElementById('characterGrid');
      grid.innerHTML = '';
      const list = filtered || characters;
      if (list.length === 0) {
        grid.innerHTML = `<div class="col-span-2 text-center py-12 text-[#9f1239]">暂无角色<br><button onclick="switchTab(2)" class="mt-6 bg-[#ec4899] text-white px-8 py-3 rounded-3xl">立即创建</button></div>`;
        return;
      }
      list.forEach((char, i) => {
        const isFav = userFavorites.includes(char.id);
        const html = `
          <div onclick="viewCharacter(${i})" class="card cursor-pointer">
            <div class="relative">
              <img src="https://picsum.photos/id/${100+i}/400/240" class="w-full aspect-video object-cover">
              ${char.nsfw ? `<span class="nsfw-tag absolute top-3 right-3 text-xs px-3 py-1">NSFW</span>` : ''}
              <span class="tag absolute bottom-3 left-3">${char.type}</span>
              <span class="tag absolute top-3 left-3">Lv.${char.level}</span>
            </div>
            <div class="p-4">
              <div class="font-semibold">${char.name}</div>
              <div class="flex flex-wrap gap-1 mt-2">${(char.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
              <div class="flex justify-between items-center mt-3 text-xs">
                <button onclick="event.stopImmediatePropagation();toggleFavorite(${char.id});" class="flex items-center gap-1">${isFav?'❤️':'♡'} ${isFav?'已收藏':'收藏'}</button>
                <button onclick="event.stopImmediatePropagation();shareCharacter(${char.id});" class="text-[#ec4899]">分享</button>
              </div>
            </div>
          </div>`;
        grid.innerHTML += html;
      });
    }

    function filterCharacters() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = characters.filter(c => 
        c.name.toLowerCase().includes(keyword) ||
        (c.tags && c.tags.some(t => t.toLowerCase().includes(keyword)))
      );
      renderCharacterGrid(filtered);
    }

    // ==================== 标签筛选 ====================
    function renderTagFilters() {
      const container = document.getElementById('tagFilters');
      const allTags = new Set();
      characters.forEach(c => (c.tags||[]).forEach(t => allTags.add(t)));
      container.innerHTML = Array.from(allTags).map(tag => 
        `<span onclick="filterByTag('${tag}')" class="tag cursor-pointer">${tag}</span>`
      ).join('');
    }

    function filterByTag(tag) {
      const filtered = characters.filter(c => (c.tags||[]).includes(tag));
      renderCharacterGrid(filtered);
    }

    // ==================== 创建角色 ====================
    let currentType = '养成';
    function selectType(btn, type) {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-[#ec4899]', 'text-white'));
      btn.classList.add('bg-[#ec4899]', 'text-white');
      currentType = type;
    }

    function toggleNSFW() {
      const isNSFW = document.getElementById('nsfwToggle').checked;
      document.getElementById('fetishSection').classList.toggle('hidden', !isNSFW);
      document.getElementById('nsfwStatus').textContent = isNSFW ? '开启' : '关闭';
    }

    function createCharacter() {
      const name = document.getElementById('aiRoleName').value.trim() || '未命名角色';
      const level = parseInt(document.getElementById('aiLevel').value);
      const nsfw = document.getElementById('nsfwToggle').checked;
      const fetish = nsfw ? document.getElementById('fetishInput').value : '';
      const tags = document.getElementById('tagsInput').value.split(',').map(t => t.trim()).filter(Boolean);
      const isPublic = document.getElementById('publicToggle').checked;
      const desc = document.getElementById('appearance').value;

      const newChar = {
        id: Date.now(),
        name: name,
        type: currentType,
        level: level,
        nsfw: nsfw,
        tags: tags,
        isPublic: isPublic,
        description: desc,
        fetish: fetish
      };

      characters.unshift(newChar);
      localStorage.setItem('characters', JSON.stringify(characters));
      renderCharacterGrid();
      renderTagFilters();
      switchTab(0);
      alert(`✅ 人物卡/剧本「${name}」（Lv.${level}）创建成功！\n已准备好 xAI API Prompt`);
    }

    // ==================== 查看 & 收藏 & 分享 ====================
    function viewCharacter(i) {
      const char = characters[i];
      currentChat = char;
      document.getElementById('chat-title').innerHTML = `与${char.name}聊天中 <span class="text-xs bg-[#f8f0f5] px-3 py-px rounded-3xl">Lv.${char.level}</span>`;
      document.getElementById('chat-level-badge').innerHTML = `智能等级 Lv.${char.level}`;
      document.getElementById('chat-type-badge').innerHTML = char.type;
      document.getElementById('character-avatar').src = `https://picsum.photos/id/${100+i}/128/128`;
      switchTab(1);
      document.getElementById('chatMessages').innerHTML = `<div class="text-center text-[#9f1239] py-8">初始场景 · ${char.type}模式启动</div>`;
      messagesHistory = [];
    }

    function toggleFavorite(id) {
      if (userFavorites.includes(id)) {
        userFavorites = userFavorites.filter(f => f !== id);
      } else {
        userFavorites.push(id);
      }
      localStorage.setItem('favorites', JSON.stringify(userFavorites));
      renderCharacterGrid();
    }

    function shareCharacter(id) {
      const char = characters.find(c => c.id === id);
      if (!char.isPublic) return alert('该角色已设置为私密，无法分享');
      alert(`🔗 分享链接已生成（模拟）：https://占位符.com/${id}\n别人可查看/收藏`);
    }

    // ==================== 聊天系统 ====================
    function addMessage(sender, text, favor = null, action = '') {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} message-container`;
      
      let html = `<div class="${sender === 'user' ? 'user-bubble' : 'ai-bubble'} chat-bubble">`;
      if (action) html += `<span class="action-text">(${action})</span>`;
      html += `<div class="whitespace-pre-wrap">${text}</div>`;
      if (favor !== null) {
        const sign = favor >= 0 ? '+' : '';
        const cls = favor >= 0 ? 'favorability-positive' : 'favorability-negative';
        html += `<div class="favorability ${cls}">好感变化 <span class="font-bold">${sign}${favor}</span></div>`;
      }
      html += `</div>`;
      div.innerHTML = html;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      messagesHistory.push({sender, text, favor, action});
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentChat) return;
      
      addMessage('user', text);
      input.value = '';

      // 根据等级决定回复长度和智能度
      const level = currentChat.level;
      let replyLength = level * 30 + 60; // 等级越高越长
      let replyText = level >= 4 ? 
        '（偷偷看了眼你的侧脸，脸红到耳根）嗯……我其实一直都很喜欢和你在一起……我们以后可以一直这样吗？（小声）' : 
        '（轻轻拉住你的袖子）嗯……我也很喜欢你呀……';
      
      // 模拟好感变化
      const favor = Math.floor(Math.random() * 5) - 2;
      
      // 扣除钻石（根据等级）
      const cost = level * 50 + 80;
      diamondBalance = Math.max(0, diamondBalance - cost);
      document.getElementById('diamond-balance').textContent = diamondBalance;
      localStorage.setItem('diamondBalance', diamondBalance);
      
      setTimeout(() => {
        addMessage('ai', replyText, favor, '脸红低头');
        
        // 随机生成图片（根据文档）
        if (Math.random() > 0.7) {
          const imgUrl = `https://picsum.photos/id/${Math.floor(Math.random()*900)+100}/600/400`;
          generatedImages.unshift({charId: currentChat.id, url: imgUrl, time: new Date().toLocaleString()});
          localStorage.setItem('generatedImages', JSON.stringify(generatedImages));
          alert('🖼️ 已根据人物卡生成图片，可在相册查看');
        }
      }, 900);
    }

    // 修改上条消息
    function editLastMessage() {
      if (messagesHistory.length < 2) return alert('没有可修改的消息');
      const lastUserMsg = messagesHistory[messagesHistory.length-2];
      if (lastUserMsg.sender !== 'user') return;
      const newText = prompt('修改上条消息内容：', lastUserMsg.text);
      if (newText) {
        lastUserMsg.text = newText;
        document.getElementById('chatMessages').innerHTML = '';
        messagesHistory.forEach(m => addMessage(m.sender, m.text, m.favor, m.action));
        alert('✅ 已重新生成后续回复（xAI 已处理）');
      }
    }

    function collapseChat() { alert('聊天已收起，可在 Telegram 内继续'); }
    function endDialog() {
      if (confirm('确定结束本次对话？')) {
        document.getElementById('chatMessages').innerHTML = '';
        messagesHistory = [];
        currentChat = null;
        switchTab(0);
      }
    }

    // ==================== 图片生成 ====================
    function showImageGenerateModal() {
      if (!currentChat) return alert('请先进入聊天');
      const prompt = `根据人物卡「${currentChat.name}」和当前对话生成动漫风格图片`;
      const imgUrl = `https://picsum.photos/id/${Math.floor(Math.random()*900)+100}/600/400`;
      generatedImages.unshift({charId: currentChat.id, url: imgUrl, time: new Date().toLocaleString()});
      localStorage.setItem('generatedImages', JSON.stringify(generatedImages));
      alert(`🖼️ 图片已生成！\nPrompt: ${prompt}`);
      renderAlbum();
      switchTab(3);
    }

    // ==================== 相册页 ====================
    function renderAlbum() {
      const grid = document.getElementById('albumGrid');
      grid.innerHTML = generatedImages.length ? '' : `<div class="col-span-2 text-center py-12 text-[#9f1239]">暂无生成图片</div>`;
      generatedImages.forEach(img => {
        grid.innerHTML += `
          <div class="card">
            <img src="${img.url}" class="w-full aspect-video object-cover">
            <div class="p-3 text-xs">生成于 ${img.time}</div>
          </div>`;
      });
    }

    // ==================== 我的页 ====================
    function renderMyPage() {
      document.getElementById('my-diamond').textContent = diamondBalance;
      
      // 我的收藏
      const favGrid = document.getElementById('myFavorites');
      favGrid.innerHTML = '';
      userFavorites.forEach(id => {
        const char = characters.find(c => c.id === id);
        if (char) {
          favGrid.innerHTML += `
            <div onclick="viewCharacterById(${id})" class="card cursor-pointer p-3">
              <div class="font-semibold">${char.name}</div>
              <div class="text-xs">${char.type} Lv.${char.level}</div>
            </div>`;
        }
      });
    }

    function viewCharacterById(id) {
      const i = characters.findIndex(c => c.id === id);
      if (i > -1) viewCharacter(i);
    }

    // ==================== 卡密充值 ====================
    function showRedeemModal() {
      const code = prompt('请输入卡密（模拟）');
      if (code && code.length > 5) {
        const amount = Math.floor(Math.random() * 5000) + 1000;
        diamondBalance += amount;
        localStorage.setItem('diamondBalance', diamondBalance);
        alert(`✅ 充值成功！+${amount}钻石（1RMB=1000钻石）`);
        renderMyPage();
      }
    }

    // ==================== DM 功能 ====================
    function showDMModal() {
      const action = prompt('DM 操作：\n1. 赠送钻石\n2. 赠送人物卡\n3. 添加卡密\n输入数字');
      if (action === '1') {
        const amt = parseInt(prompt('赠送钻石数量'));
        if (amt) {
          diamondBalance = Math.max(0, diamondBalance - amt);
          alert(`🎁 已赠送 ${amt} 钻石给好友（模拟）`);
          localStorage.setItem('diamondBalance', diamondBalance);
          renderMyPage();
        }
      } else if (action === '2') {
        alert('🎟️ 已通过 DM 赠送人物卡给好友');
      } else if (action === '3') {
        alert('🔑 卡密已通过 DM 添加');
      }
    }

    function showGiftModal() {
      showDMModal();
    }

    // ==================== 初始化 ====================
    window.onload = () => {
      initTailwind();
      
      // 模拟时间
      setInterval(() => {
        const now = new Date();
        document.getElementById('current-time').textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      }, 60000);

      renderCharacterGrid();
      renderTagFilters();
      renderAlbum();
      ;
      console.log('🚀 部署就绪，上线中。。。');
    };
  </script>
</body>
</html>
