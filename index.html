<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DND AI 助手</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a0033; font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: scale(1.03); box-shadow: 0 0 25px #a855f7; }
    .tab-active { color: #a855f7; border-top: 3px solid #a855f7; }
    .modal-content { max-height: 90vh; overflow-y: auto; }
    .chat-bubble { max-width: 75%; padding: 12px 18px; border-radius: 20px; }
    .user-msg { background: #a855f7; color: white; }
    .ai-reply { background: #3a0055; color: white; }
    .avatar { width: 80px; height: 80px; border-radius: 9999px; object-fit: cover; border: 4px solid #a855f7; }
    .blue-label { background: #3b82f6; color: white; padding: 4px 12px; border-radius: 9999px; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; }
    
    /* 新增：AI回复格式化样式（动作斜体 + 对话粗体） */
    .ai-reply i { color: #a5b4fc; font-style: italic; }
    .ai-reply b { color: #facc15; font-weight: bold; }
  </style>
</head>
<body class="text-white min-h-screen bg-[#1a0033] pb-20">

  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-4">DND AI 助手</h1>
  </div>

  <div class="max-w-2xl mx-auto px-4">

    <!-- 聊天 Tab -->
    <div id="tab-chat" class="tab-content">
      <h2 class="text-2xl font-bold mb-4">选择人物卡开始聊天</h2>
      <div id="chatCardsGrid" class="grid grid-cols-2 gap-4 mb-8"></div>
      <div id="chatWindow" class="hidden bg-[#2a0044] rounded-3xl p-4 h-[420px] flex flex-col">
        <div class="flex items-center gap-3 mb-4 border-b border-white/10 pb-3">
          <div id="chatCardName" class="font-bold text-lg"></div>
          <button onclick="closeChat()" class="ml-auto text-white/60 text-sm">关闭</button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto space-y-4 py-2"></div>
        <div class="flex gap-2 mt-auto">
          <input id="chatInput" placeholder="输入消息..." class="flex-1 bg-[#1a0033] rounded-2xl px-5 py-3 focus:outline-none">
          <button onclick="sendChatMessage()" class="bg-[#a855f7] px-8 rounded-2xl font-bold">发送</button>
        </div>
      </div>
    </div>

    <!-- 人物卡 Tab -->
    <div id="tab-cards" class="tab-content hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold">人物卡</h2>
        <button onclick="showModal()" class="bg-[#a855f7] hover:bg-[#9333ea] px-6 py-3 rounded-2xl font-bold active:scale-95">+ 新建</button>
      </div>
      <input id="searchInput" onkeyup="if(event.key==='Enter') filterRoles()" placeholder="搜索角色或标签..." 
             class="w-full bg-[#2a0044] border border-white/10 rounded-2xl px-5 py-4 text-lg mb-4 focus:outline-none focus:border-[#a855f7]">
      <div class="flex items-center justify-between mb-4">
        <div id="tagFilters" class="flex flex-wrap gap-2 flex-1"></div>
        <button onclick="clearAllFilters()" id="clearFilterBtn" class="hidden text-xs bg-white/10 hover:bg-white/20 px-4 py-1 rounded-3xl">清除筛选</button>
      </div>
      <div id="rolesGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <!-- 赚钻石 Tab -->
    <div id="tab-diamonds" class="tab-content hidden text-center py-12">
      <h2 class="text-3xl font-bold mb-6">赚钻石</h2>
      <div class="bg-[#2a0044] rounded-3xl p-10">
        <p class="text-7xl mb-6">Diamond</p>
        <p class="text-xl mb-8">当前页面暂时为空</p>
        <button onclick="fakeLottery()" class="bg-[#a855f7] hover:bg-[#9333ea] px-10 py-4 rounded-2xl font-bold text-xl active:scale-95 transition">Ticket 立即签到（+50 钻石）</button>
      </div>
    </div>

    <!-- 我的 Tab -->
    <div id="tab-profile" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-6">我的</h2>
      <div class="bg-[#2a0044] rounded-3xl p-6 mb-8">
        <div class="flex flex-col items-center mb-6">
          <img id="userAvatar" src="https://via.placeholder.com/80/a855f7/ffffff?text=User" alt="头像" class="avatar mb-4 cursor-pointer" onclick="document.getElementById('avatarUpload').click()">
          <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
          <button onclick="document.getElementById('avatarUpload').click()" class="text-xs bg-white/10 hover:bg-white/20 px-6 py-2 rounded-3xl">更换头像</button>
        </div>
        <div class="mb-6">
          <div class="text-white/70 text-sm mb-2">自定义名字</div>
          <div class="flex gap-3">
            <input id="customNameInput" class="flex-1 bg-[#374151] rounded-2xl px-5 py-4 text-lg" placeholder="输入你的名字">
            <button onclick="saveProfile()" class="bg-[#a855f7] px-8 rounded-2xl font-bold">保存</button>
          </div>
        </div>
        <div class="flex justify-between items-center bg-[#1a0033] rounded-3xl p-6">
          <div>
            <div class="text-white/60 text-sm">钻石余额</div>
            <div id="diamondCount" class="text-6xl font-bold text-[#a855f7]">128</div>
          </div>
          <div class="text-7xl">Diamond</div>
        </div>
      </div>
      <div class="mb-4 flex justify-between items-center">
        <div class="text-white/60">我创建的人物卡（<span id="cardCount">0</span> 张）</div>
      </div>
      <div id="myCardsList" class="space-y-3 mb-10"></div>

      <!-- 我的生成图片 -->
      <div class="text-white/60 mb-4">我的生成图片</div>
      <div id="myGeneratedImages" class="grid grid-cols-3 gap-3"></div>
    </div>

  </div>

  <!-- 底部 Tab Bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-[#1a0033] border-t border-white/10 max-w-2xl mx-auto">
    <div class="flex text-white/70 text-xs">
      <div onclick="switchTab(0)" class="flex-1 py-3 flex flex-col items-center tab-active">
        <span>💬</span>
        <span class="mt-1">聊天</span>
      </div>
      <div onclick="switchTab(1)" class="flex-1 py-3 flex flex-col items-center">
        <span>🃏</span>
        <span class="mt-1">人物卡</span>
      </div>
      <div onclick="switchTab(2)" class="flex-1 py-3 flex flex-col items-center">
        <span>💎</span>
        <span class="mt-1">赚钻石</span>
      </div>
      <div onclick="switchTab(3)" class="flex-1 py-3 flex flex-col items-center">
        <span>👤</span>
        <span class="mt-1">我的</span>
      </div>
    </div>
  </div>

  <!-- 新建角色卡 Modal -->
  <div id="modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal-content bg-[#2a0044] w-full max-w-lg mx-4 rounded-3xl p-6">
      <h3 class="text-2xl font-bold mb-4">新建人物卡</h3>
      <input id="modalName" placeholder="角色名称" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-3">
      <div class="grid grid-cols-2 gap-3 mb-3">
        <input id="modalGender" placeholder="性别" class="bg-[#1a0033] rounded-2xl px-5 py-4">
        <input id="modalAge" placeholder="年龄" class="bg-[#1a0033] rounded-2xl px-5 py-4">
      </div>
      <textarea id="modalPersonality" placeholder="个性" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 h-24 mb-3"></textarea>
      <textarea id="modalAppearance" placeholder="外貌" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 h-24 mb-3"></textarea>
      <textarea id="modalBackground" placeholder="背景故事" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 h-24 mb-3"></textarea>
      <button onclick="createRoleCard()" class="w-full bg-[#a855f7] py-4 rounded-2xl font-bold">保存角色卡</button>
      <button onclick="hideModal()" class="mt-3 w-full bg-white/10 py-4 rounded-2xl">取消</button>
    </div>
  </div>

  <script>
    // ==================== 【必须修改】后端 API 地址 ====================
    const API_BASE = 'https://你的-railway-域名.railway.app';   // ←←← 改成你 Railway 的真实域名！！！

    // Telegram WebApp 初始化
    Telegram.WebApp.ready();
    const tgUser = Telegram.WebApp.initDataUnsafe.user || { id: 0 };
    console.log('Telegram 用户 ID:', tgUser.id);

    // Supabase 配置（保持你原来的）
    const SUPABASE_URL = 'https://你的-supabase-url.supabase.co';
    const SUPABASE_KEY = '你的-supabase-anon-key';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentChatCard = null;
    let currentUser = null;

    // ==================== 聊天发送函数（已适配 xAI + HTML格式） ====================
    async function sendChatMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg || !currentChatCard) return;

      // 显示用户消息
      appendMessage('user', msg);
      input.value = '';

      // 显示 loading
      const loadingId = appendLoading();

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tg_id: tgUser.id,
            card: currentChatCard,
            message: msg
          })
        });

        const data = await res.json();

        removeLoading(loadingId);

        if (data.error) {
          appendMessage('bot', '❌ ' + data.error);
        } else {
          // 关键：用 innerHTML 渲染 HTML 格式（斜体动作 + 粗体对话）
          appendMessage('bot', data.reply, true);
          console.log(`💎 已扣除 ${data.cost} 钻石`);
        }
      } catch (e) {
        removeLoading(loadingId);
        appendMessage('bot', '网络错误，请重试');
      }
    }

    // ==================== 消息渲染函数（支持 HTML） ====================
    function appendMessage(sender, content, isHTML = false) {
      const chatMessages = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `chat-bubble flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

      const bubble = document.createElement('div');
      bubble.className = sender === 'user' ? 'user-msg' : 'ai-reply';

      if (isHTML) {
        bubble.innerHTML = content;
      } else {
        bubble.textContent = content;
      }

      messageDiv.appendChild(bubble);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // loading 函数（你原来的逻辑）
    function appendLoading() {
      const chatMessages = document.getElementById('chatMessages');
      const id = 'loading-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = 'flex justify-start';
      div.innerHTML = `<div class="ai-reply px-4 py-2 rounded-2xl flex items-center gap-2"><span class="animate-pulse">AI思考中</span><span class="dot-flashing"></span></div>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return id;
    }

    function removeLoading(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
=======================
  function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    const tabs = ['tab-chat','tab-cards','tab-diamonds','tab-profile'];
    document.getElementById(tabs[n]).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach((btn,i) => btn.classList.toggle('tab-active', i===n));
    if(n===0) loadChatCards();
    if(n===1) loadRoles();
    if(n===3) loadProfile();
  }

  async function loadRoles() {
    const { data } = await supabaseClient.from('role_cards').select('*').eq('owner_id', userId).order('id', { ascending: false });
    allCards = data || [];
    renderFilterTags();
    filterRoles();
  }

  function renderFilterTags() {
    const container = document.getElementById('tagFilters');
    const allTags = [...new Set(allCards.flatMap(c => c.tags || []))].sort();
    container.innerHTML = allTags.length ? allTags.map(tag => `
      <span onclick="toggleFilterTag('${tag}')" class="inline-block px-4 py-1 bg-[#3a0055] hover:bg-[#a855f7] text-sm rounded-3xl cursor-pointer ${selectedFilterTags.includes(tag)?'bg-[#a855f7] text-white':''}">#${tag}</span>`).join('') : `<div class="text-sm text-white/40">创建卡片后这里会出现可点击标签</div>`;
    document.getElementById('clearFilterBtn').classList.toggle('hidden', selectedFilterTags.length === 0);
  }

  function toggleFilterTag(tag) {
    if (selectedFilterTags.includes(tag)) selectedFilterTags = selectedFilterTags.filter(t => t !== tag);
    else selectedFilterTags.push(tag);
    filterRoles();
    renderFilterTags();
  }

  function clearAllFilters() {
    selectedFilterTags = [];
    document.getElementById('searchInput').value = '';
    filterRoles();
    renderFilterTags();
  }

  function filterRoles() {
    const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = allCards;
    if (searchTerm) filtered = filtered.filter(card => card.name.toLowerCase().includes(searchTerm) || (card.tags || []).some(tag => tag.toLowerCase().includes(searchTerm)));
    if (selectedFilterTags.length > 0) filtered = filtered.filter(card => (card.tags || []).some(t => selectedFilterTags.includes(t)));
    renderCards(filtered);
  }

  function renderCards(cards) {
    const grid = document.getElementById('rolesGrid');
    if (!cards.length) {
      grid.innerHTML = `<div class="col-span-full text-center py-12 text-white/50">没有找到匹配的角色卡～</div>`;
      return;
    }
    grid.innerHTML = cards.map(card => `
      <div onclick="editCard(${card.id})" class="card bg-[#2a0044] rounded-3xl overflow-hidden p-5 cursor-pointer">
        <div class="font-bold text-xl mb-1">${card.name}</div>
        ${card.gender ? `<span class="inline-block px-3 py-0.5 text-xs bg-blue-500 rounded-full">${card.gender}</span>` : ''}
        ${card.age ? `<span class="ml-2 text-xs text-blue-400">年龄 ${card.age}</span>` : ''}
        ${card.nsfw ? `<span class="ml-2 inline-block px-3 py-0.5 text-xs bg-red-500 rounded-full">NSFW</span>` : ''}
        ${card.tags && card.tags.length ? `<div class="flex flex-wrap gap-1 mt-3">${card.tags.map(t=>`<span class="text-xs bg-[#a855f7]/20 text-[#a855f7] px-3 py-0.5 rounded-3xl">#${t}</span>`).join('')}</div>` : ''}
        ${card.personality ? `<div class="text-sm text-white/70 mt-3">性格：${card.personality}</div>` : ''}
        ${card.appearance ? `<div class="text-xs text-white/50 line-clamp-2 mt-1">${card.appearance}</div>` : ''}
      </div>`).join('');
  }

  function loadChatCards() {
    const grid = document.getElementById('chatCardsGrid');
    if (!allCards.length) {
      grid.innerHTML = `<div class="col-span-full text-center py-12 text-white/50">还没有人物卡，先去「人物卡」创建吧～</div>`;
      return;
    }
    grid.innerHTML = allCards.map(card => `
      <div onclick="startChat(${card.id})" class="card bg-[#2a0044] rounded-3xl p-5 cursor-pointer">
        <div class="font-bold text-lg">${card.name}</div>
        ${card.tags && card.tags.length ? `<div class="flex flex-wrap gap-1 mt-2">${card.tags.map(t=>`<span class="text-xs bg-[#a855f7]/20 px-3 py-0.5 rounded-3xl">#${t}</span>`).join('')}</div>` : ''}
      </div>`).join('');
  }

  function startChat(id) {
    currentChatCard = allCards.find(c => c.id === id);
    if (!currentChatCard) return;
    document.getElementById('chatCardName').textContent = currentChatCard.name;
    document.getElementById('chatMessages').innerHTML = `<div class="text-center text-white/50 py-8">已加载角色设定：<br><span class="text-[#a855f7]">${currentChatCard.name}</span></div>`;
    document.getElementById('chatWindow').classList.remove('hidden');
  }

  function closeChat() {
    document.getElementById('chatWindow').classList.add('hidden');
    currentChatCard = null;
  }

  function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg || !currentChatCard) return;
    const messagesDiv = document.getElementById('chatMessages');
    const userBubble = document.createElement('div');
    userBubble.className = 'flex justify-end mb-2';
    userBubble.innerHTML = `<div class="chat-bubble user-msg">${msg}</div>`;
    messagesDiv.appendChild(userBubble);
    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function showModal(isEdit = false) {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalTitle').textContent = isEdit ? '编辑角色卡' : 'AI角色名（必填）';
    document.getElementById('deleteBtn').classList.toggle('hidden', !isEdit);
    document.getElementById('saveBtn').textContent = isEdit ? '保存修改' : '提交';
    currentTags = [];
    document.getElementById('tagChips').innerHTML = '';
    document.getElementById('generatedImagePreview').classList.add('hidden');
    document.getElementById('nsfwToggle').checked = false;
    document.getElementById('kinksSection').classList.add('hidden');
    document.getElementById('gender').value = '女';
    updateTokenCount();
  }

  function hideModal() {
    document.getElementById('modal').classList.add('hidden');
    currentEditId = null;
  }

  function addTag() {
    const input = document.getElementById('tagInput');
    const val = input.value.trim();
    if (!val || currentTags.includes(val)) return;
    currentTags.push(val);
    renderChips();
    input.value = '';
    updateTokenCount();
  }

  function renderChips() {
    const container = document.getElementById('tagChips');
    container.innerHTML = currentTags.map((tag, i) => `
      <span class="inline-flex items-center bg-[#3b82f6] text-white text-sm px-4 py-1 rounded-3xl">#${tag}<span onclick="removeTag(${i});event.stopImmediatePropagation()" class="ml-2 cursor-pointer text-xs">✕</span></span>`).join('');
  }

  window.removeTag = function(i) {
    currentTags.splice(i, 1);
    renderChips();
    updateTokenCount();
  };

  async function saveCard() {
    const name = document.getElementById('cardName').value.trim();
    if (!name) return alert("AI角色名不能为空！");
    const age = parseInt(document.getElementById('age').value);
    if (age < 18) return alert("年龄必须 ≥ 18 岁！");
    const payload = {
      owner_id: userId,
      name: name,
      tags: currentTags,
      gender: document.getElementById('gender').value,
      age: age,
      personality: document.getElementById('personality').value,
      appearance: document.getElementById('appearance').value,
      background: document.getElementById('background').value,
      kinks: document.getElementById('nsfwToggle').checked ? document.getElementById('kinks').value : null,
      nsfw: document.getElementById('nsfwToggle').checked
    };
    let error;
    if (currentEditId) {
      ({ error } = await supabaseClient.from('role_cards').update(payload).eq('id', currentEditId));
    } else {
      ({ error } = await supabaseClient.from('role_cards').insert(payload));
    }
    if (error) alert("保存失败: " + error.message);
    else {
      alert(currentEditId ? "✅ 修改成功！" : "✅ 创建成功！");
      hideModal();
      loadRoles();
    }
  }

  function editCard(id) {
    const card = allCards.find(c => c.id === id);
    if (!card) return;
    currentEditId = id;
    currentTags = card.tags || [];
    document.getElementById('cardName').value = card.name || '';
    document.getElementById('userRoleName').value = '';
    document.getElementById('nsfwToggle').checked = !!card.nsfw;
    document.getElementById('gender').value = card.gender || '女';
    document.getElementById('age').value = card.age || '';
    document.getElementById('personality').value = card.personality || '';
    document.getElementById('appearance').value = card.appearance || '';
    document.getElementById('background').value = card.background || '';
    document.getElementById('kinks').value = card.kinks || '';
    document.getElementById('kinksSection').classList.toggle('hidden', !card.nsfw);
    renderChips();
    showModal(true);
    updateTokenCount();
  }

  async function deleteCard() {
    if (!currentEditId) return;
    if (!confirm("确定删除这张角色卡吗？不可恢复！")) return;
    const { error } = await supabaseClient.from('role_cards').delete().eq('id', currentEditId);
    if (error) alert("删除失败: " + error.message);
    else {
      alert("🗑 删除成功！");
      hideModal();
      loadRoles();
    }
  }

  // ====================== 生成图片 ======================
  async function generateCardImage() {
    const prompt = `${document.getElementById('cardName').value}，${document.getElementById('appearance').value}，${document.getElementById('background').value}，精美卡通风格`;
    alert("正在调用 Grok Imagine 生成图片...\n\n提示词：" + prompt + "\n\n（后端调用 xAI API 后返回图片URL）");
    const fakeUrl = "https://picsum.photos/id/1015/600/800";
    document.getElementById('previewImg').src = fakeUrl;
    document.getElementById('generatedImagePreview').classList.remove('hidden');
  }

  function setAsCover() {
    alert("✅ 已设置为人物卡封面！");
    hideModal();
  }

  function saveGeneratedImage() {
    const url = document.getElementById('previewImg').src;
    generatedImages.unshift(url);
    renderMyGeneratedImages();
    alert("✅ 图片已保存到「我的」页面！");
    hideModal();
  }

  function renderMyGeneratedImages() {
    const container = document.getElementById('myGeneratedImages');
    container.innerHTML = generatedImages.map(url => `
      <img src="${url}" class="rounded-2xl cursor-pointer" onclick="alert('查看大图或删除功能后续添加')">
    `).join('');
  }

  // ====================== 我的页面 ======================
  async function loadProfile() {
    // 钻石实时读取（已实现）
    const { data: profile } = await supabaseClient.from('user_profiles').select('custom_name, diamonds, custom_avatar_url').eq('user_id', userId).single();
    const name = profile?.custom_name || "玩家";
    const diamonds = profile?.diamonds || 128;
    const avatarUrl = profile?.custom_avatar_url || "https://via.placeholder.com/80/a855f7/ffffff?text=👤";
    document.getElementById('userName').textContent = name;
    document.getElementById('customNameInput').value = name;
    document.getElementById('diamondCount').textContent = diamonds;
    document.getElementById('userAvatar').src = avatarUrl;
    document.getElementById('cardCount').textContent = allCards.length;
    const list = document.getElementById('myCardsList');
    list.innerHTML = allCards.length ? allCards.map(c => `
      <div class="bg-[#2a0044] rounded-2xl p-4 flex justify-between items-center">
        <div><div class="font-medium">${c.name}</div>${c.gender ? `<div class="text-xs text-blue-400">性别：${c.gender}</div>` : ''}</div>
        <div class="text-[#a855f7] text-sm">${c.tags ? c.tags.join(' ') : ''}</div>
      </div>`).join('') : '<div class="text-white/50 text-center py-8">还没有卡片哦～快去创建吧！</div>';
    renderMyGeneratedImages();
  }

  async function saveProfile() {
    const newName = document.getElementById('customNameInput').value.trim() || "玩家";
    const { error } = await supabaseClient.from('user_profiles').update({ custom_name: newName }).eq('user_id', userId);
    if (error) alert("保存失败");
    else { alert("✅ 名字已保存"); loadProfile(); }
  }

  async function uploadAvatar(e) {
    alert("头像上传功能目前仅演示");
  }

  function fakeLottery() {
    alert("🎉 +50 钻石！");
    loadProfile();
  }

  window.onload = () => {
    loadRoles();
    switchTab(1);
  };
</script>
