<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DND 角色广场</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a0033; font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s; }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 25px #a855f7; }
  </style>
</head>
<body class="text-white min-h-screen pb-20 bg-[#1a0033]">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-4xl font-bold flex items-center gap-3">DND 剧本杀 <span class="text-xs bg-[#a855f7] px-4 py-1 rounded-full">角色广场</span></h1>
      <button onclick="showCreateModal()" class="bg-[#a855f7] hover:bg-[#9333ea] px-8 py-3 rounded-2xl font-bold text-lg shadow-lg">+ 新建角色卡</button>
    </div>

    <input id="searchInput" onkeyup="loadRoles()" placeholder="搜索角色..." 
           class="w-full bg-[#2a0044] border border-white/10 rounded-2xl px-5 py-4 text-lg mb-8">

    <div id="rolesGrid" class="grid grid-cols-2 gap-4"></div>
  </div>

  <!-- 创建弹窗 -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-[#2a0044] w-full max-w-lg mx-4 rounded-3xl p-6">
      <h2 class="text-2xl font-bold mb-6">新建角色卡</h2>
      <input id="cardName" placeholder="角色名称（必填）" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-4">
      <textarea id="systemPrompt" rows="8" placeholder="角色详细设定（系统提示词）" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4"></textarea>
      <div class="flex gap-3 mt-8">
        <button onclick="hideCreateModal()" class="flex-1 py-4 rounded-2xl border border-white/30">取消</button>
        <button onclick="createCard()" class="flex-1 py-4 bg-[#a855f7] rounded-2xl font-bold">提交创建</button>
      </div>
    </div>
  </div>

  <script>
    // Telegram 初始化
    <script>
    const webApp = window.Telegram.WebApp;
    webApp.ready();
    const tgUser = webApp.initDataUnsafe.user;
    const userId = tgUser ? tgUser.id : 123;

    // === 必须改成你自己的 Supabase 配置 ===
    const SUPABASE_URL = "https://pttzjqrdsgjygglkhvot.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0dHpqcXJkc2dqeWdnbGtodm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTE1MzIsImV4cCI6MjA4OTQ4NzUzMn0.9m7fEqMAsQcCYM0FEDta9gkg-EhSsL4EbhUoOGI8peg"; 

    // 关键修复：CDN 正确初始化方式（避免变量冲突）
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadRoles() {
      const { data, error } = await db
        .from('role_cards')
        .select('*')
        .eq('owner_id', userId);
      if (error) console.error("加载失败:", error);
      renderCards(data || []);
    }

    function renderCards(cards) {
      const grid = document.getElementById('rolesGrid');
      grid.innerHTML = cards.map(card => `
        <div onclick="useCard(${card.id}, '${card.name.replace(/'/g, "\\'")}')" 
             class="card bg-[#2a0044] rounded-3xl overflow-hidden p-4 cursor-pointer">
          <div class="font-bold text-xl">${card.name}</div>
          <span class="bg-red-500 text-xs px-3 py-1 rounded-full mt-2 inline-block">NSFW</span>
          <div class="text-white/70 text-sm mt-3 line-clamp-3">${(card.system_prompt || '').substring(0,80)}...</div>
          <div class="text-xs text-purple-400 mt-4">ID: ${card.id}</div>
        </div>
      `).join('');
    }

    function filterCards() {
      loadRoles(); // 后面可以改成真正的搜索
    }

    async function createCard() {
      const name = document.getElementById('cardName').value.trim();
      const promptText = document.getElementById('systemPrompt').value.trim();
      if (!name || !promptText) return alert("请填写名称和设定！");

      const { error } = await db.from('role_cards').insert({
        owner_id: userId,
        name: name,
        system_prompt: promptText
      });

      if (error) alert("保存失败: " + error.message);
      else {
        alert("创建成功！\n\n回到聊天输入 /usecard ID 即可使用");
        hideCreateModal();
        loadRoles();
      }
    }

    function showCreateModal() { 
      document.getElementById('createModal').classList.remove('hidden'); 
    }
    function hideCreateModal() { 
      document.getElementById('createModal').classList.add('hidden'); 
    }

    function useCard(id, name) {
      const text = `/usecard ${id}`;
      navigator.clipboard.writeText(text);
      alert(`已复制命令：\n${text}\n\n请回到 Telegram 主聊天窗口粘贴发送\n即可加载角色卡「${name}」`);
    }

    // 初始化
    window.onload = () => {
      loadRoles();
    };
  </script>
</body>
</html>
