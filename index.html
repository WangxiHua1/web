<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DND 角色广场</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a0033; font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s; }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 25px #a855f7; }
  </style>
</head>
<body class="text-white min-h-screen pb-20">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        DND 剧本杀 <span class="text-xs bg-[#a855f7] px-3 py-1 rounded-full">角色广场</span>
      </h1>
      <button onclick="showCreateModal()" class="bg-[#a855f7] px-8 py-3 rounded-2xl font-bold">+ 新建角色卡</button>
    </div>
    <input id="searchInput" onkeyup="loadRoles()" placeholder="搜索角色..." class="w-full bg-[#2a0044] border border-white/10 rounded-2xl px-5 py-4 mb-8">
    <div id="rolesGrid" class="grid grid-cols-2 gap-4"></div>
  </div>

  <!-- 创建弹窗 -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-[#2a0044] w-full max-w-lg mx-4 rounded-3xl p-6">
      <h2 class="text-2xl font-bold mb-6">新建角色卡</h2>
      <input id="cardName" placeholder="角色名称" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4 mb-4">
      <textarea id="systemPrompt" rows="8" placeholder="角色详细设定" class="w-full bg-[#1a0033] rounded-2xl px-5 py-4"></textarea>
      <div class="flex gap-3 mt-8">
        <button onclick="hideCreateModal()" class="flex-1 py-4 rounded-2xl border">取消</button>
        <button onclick="createCard()" class="flex-1 py-4 bg-[#a855f7] rounded-2xl font-bold">提交创建</button>
      </div>
    </div>
  </div>

  <script>
    const webApp = window.Telegram.WebApp;
    webApp.ready(); webApp.expand();
    const userId = webApp.initDataUnsafe.user?.id || 123;

    const SUPABASE_URL = "https://pttzjqrdsgjygglkhvot.supabase.co";          // ← 你的真实 URL
    const SUPABASE_ANON_KEY = "sb_secret_dViXuEtXbH6o_ARpLEMKfw_JXxpJS-7";         // ← 你的真实 key
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function createCard() {
      alert("🔄 开始创建角色卡...");   // 第一步提示

      const name = document.getElementById('cardName').value.trim();
      const promptText = document.getElementById('systemPrompt').value.trim();
      if (!name || !promptText) return alert("❌ 名称和设定不能为空！");

      try {
        alert("📤 正在提交到 Supabase...");
        const { data, error } = await supabase.from('role_cards').insert({
          owner_id: userId,
          name: name,
          system_prompt: promptText
        });

        if (error) {
          alert("❌ 创建失败！\n错误信息：" + error.message);
          console.error(error);
        } else {
          alert("✅ 创建成功！\nID: " + (data[0]?.id || '未知') + "\n\n回到聊天输入 /usecard [ID] 即可使用");
          hideCreateModal();
          loadRoles();
        }
      } catch (e) {
        alert("❌ 意外错误：" + e.message);
        console.error(e);
      }
    }

    // 其他函数不变（loadRoles、renderCards 等）
    async function loadRoles() {
      const { data } = await supabase.from('role_cards').select('*').eq('owner_id', userId);
      document.getElementById('rolesGrid').innerHTML = (data || []).map(c => `
        <div onclick="useCard(${c.id}, '${c.name}')" class="card bg-[#2a0044] rounded-3xl p-4 cursor-pointer">
          <div class="font-bold text-xl">${c.name}</div>
          <div class="text-xs text-purple-400 mt-2">ID: ${c.id}</div>
        </div>
      `).join('');
    }

    function useCard(id, name) {
      navigator.clipboard.writeText(`/usecard ${id}`);
      alert(`✅ 已复制 /usecard ${id}\n\n回到主聊天粘贴发送即可！`);
    }

    function showCreateModal() { document.getElementById('createModal').classList.remove('hidden'); }
    function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }

    window.onload = () => loadRoles();
  </script>
</body>
</html>
