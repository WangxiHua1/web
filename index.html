<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 陪聊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        :root {
            --primary: #c026d3;
        }
        
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
        }
        
        .mobile-frame {
            max-width: 420px;
            margin: 0 auto;
            border: 12px solid #111827;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            height: 100vh;
            background: #111827;
            position: relative;
        }
        
        .status-bar {
            height: 48px;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 13px;
            color: #fff;
        }
        
        .chat-bubble-me {
            background: #c026d3;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }
        
        .chat-bubble-ai {
            background: #1f2937;
            border-radius: 20px 20px 20px 4px;
        }
        
        .nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-item.active {
            color: #c026d3;
            transform: scale(1.1);
        }
        
        .dark .card {
            background: #1f2937;
        }
        
        .light {
            --primary: #a21caf;
            background: #f8fafc;
            color: #0f172a;
        }
        
        .light .mobile-frame {
            border-color: #e2e8f0;
            background: #f8fafc;
        }
        
        .light .status-bar {
            background: #f8fafc;
            color: #0f172a;
        }
        
        .light .chat-bubble-ai {
            background: #e2e8f0;
            color: #0f172a;
        }
        
        .select-playtype {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="dark bg-gray-950 text-white flex items-center justify-center min-h-screen">
    <div class="mobile-frame">
        <!-- 顶部状态栏（时间实时更新） -->
        <div class="status-bar">
            <div class="flex items-center gap-2">
        <span id="time" class="font-medium"></span>
            </div>
            <div class="flex items-center gap-3">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <span id="battery">60%</span>
    </div>
</div>

        <!-- 页面容器 -->
        <div id="app" class="h-[calc(100vh-48px)] flex flex-col overflow-hidden">
            
            <!-- 导航栏标题 -->
           <div class="px-4 py-3 flex items-center justify-between border-b border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white font-bold text-xl px-3 py-1 rounded-xl">AI 陪聊</div>
                </div>
                
                <!-- 浅色/深色切换按钮 -->
                <button onclick="toggleTheme()" 
                        class="flex items-center gap-2 bg-gray-900 dark:bg-gray-900 hover:bg-gray-800 text-white px-5 h-9 rounded-3xl text-sm font-medium">
                    <i id="theme-icon" class="fa-solid fa-sun text-yellow-300"></i>
                    <span id="theme-text" class="text-sm">浅色</span>
                </button>
                
                <div class="flex items-center gap-4">
                    <i onclick="showNotifications()" class="fa-solid fa-bell text-2xl text-gray-400"></i>
                    <i onclick="showProfile()" class="fa-solid fa-circle-user text-2xl text-gray-400"></i>
                </div>
            </div>

            <!-- 页面内容 -->
            <div id="page-content" class="flex-1 overflow-auto">
                
                <!-- 默认首页：发现页（模仿截图） -->
                <div id="discover-page" class="p-4">
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-lg font-semibold">发现角色</div>
                        <button onclick="switchToCreate()" 
                                class="bg-[#c026d3] hover:bg-[#a21caf] text-white px-6 py-2 rounded-3xl flex items-center gap-2 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i>
                            <span>创建新人物卡</span>
                        </button>
                    </div>
                    
                    <!-- 搜索栏 -->
                    <div class="relative mb-6">
                        <input type="text" id="search-input" placeholder="搜索角色名称 / 关键词 / 标签" 
                               class="w-full bg-gray-800 light:bg-white light:text-gray-900 px-4 py-3 pl-12 rounded-3xl text-sm focus:outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-gray-400"></i>
                    </div>
                    
                    <!-- 筛选标签 -->
                    <div class="flex gap-2 overflow-x-auto pb-3 mb-4">
                    <div onclick="filterByType(this)" data-type="all" class="select-playtype active px-5 py-1 bg-pink-600 text-white rounded-3xl text-sm whitespace-nowrap">全部</div>
                    <div onclick="filterByType(this)" data-type="养成" class="select-playtype px-5 py-1 bg-gray-800 light:bg-gray-200 light:text-gray-900 rounded-3xl text-sm whitespace-nowrap">养成系统</div>
                    <div onclick="filterByType(this)" data-type="剧本" class="select-playtype px-5 py-1 bg-gray-800 light:bg-gray-200 light:text-gray-900 rounded-3xl text-sm whitespace-nowrap">剧本系统</div>
                    <div onclick="filterByType(this)" data-type="NSFW" class="select-playtype px-5 py-1 bg-gray-800 light:bg-gray-200 light:text-gray-900 rounded-3xl text-sm whitespace-nowrap">NSFW</div>
</div>
                    
                    <!-- 角色卡列表 -->
                    <div id="role-list" class="px-4 grid grid-cols-2 gap-4 pb-8">
                    <!-- JS动态生成，图片高度增大 -->
                </div>
            </div>
                
                <!-- 创建新人物卡页面（完全按照第9张截图 + 用户需求） -->
                <div id="create-page" class="hidden flex-1 flex flex-col overflow-auto p-4 bg-white dark:bg-[#111827]">
                <!-- ... 保持上一版创建表单，颜色已优化 ... -->
                <div class="flex items-center justify-between mb-6">
                    <button onclick="backToDiscover()" class="flex items-center text-pink-500">
                        <i class="fa-solid fa-chevron-left mr-1"></i> 返回
                    </button>
                    <div class="font-semibold text-lg">创建新人物卡 / 剧本</div>
                </div>
                
                <form id="create-form" onsubmit="handleCreateRole(event)" class="flex-1 flex flex-col gap-6">
                    <!-- 角色名字 -->
                    <div>
                        <label class="text-sm text-gray-500 mb-1 block">角色名字 <span class="text-red-500">*</span></label>
                        <input type="text" id="role-name" required placeholder="Yuki" 
                               class="w-full bg-gray-100 dark:bg-gray-800 px-5 py-4 rounded-3xl text-base focus:outline-none">
                    </div>
                    
                    <!-- AI类型 -->
                    <div>
                        <label class="text-sm text-gray-500 mb-2 block">AI类型</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label onclick="selectPlayType(this)" data-value="养成" class="select-playtype flex flex-col items-center justify-center bg-gray-100 dark:bg-gray-800 hover:bg-pink-100 border-2 border-transparent hover:border-pink-400 rounded-3xl py-6 cursor-pointer">
                                <i class="fa-solid fa-heart text-4xl text-pink-400 mb-2"></i>
                                <div class="font-medium">养成系统</div>
                            </label>
                            <label onclick="selectPlayType(this)" data-value="剧本" class="select-playtype flex flex-col items-center justify-center bg-gray-100 dark:bg-gray-800 hover:bg-purple-100 border-2 border-transparent hover:border-purple-400 rounded-3xl py-6 cursor-pointer">
                                <i class="fa-solid fa-book text-4xl text-purple-400 mb-2"></i>
                                <div class="font-medium">剧本系统</div>
                            </label>
                        </div>
                        <input type="hidden" id="play-type" value="养成">
                    </div>
                        
                        <!-- NSFW 开关 -->
                        <div class="flex items-center justify-between bg-gray-800 light:bg-gray-100 px-4 py-4 rounded-3xl">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-fire text-orange-400"></i>
                                <span class="font-medium">NSFW</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="nsfw-toggle" class="sr-only peer" onchange="toggleKinksField()">
                                <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-pink-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-pink-500"></div>
                            </label>
                        </div>
                        
                        <!-- 性癖字段（仅NSFW开启时显示） -->
                        <div id="kinks-field" class="hidden">
                            <label class="text-sm text-gray-400 mb-1 block">性癖（多个用逗号分隔）</label>
                            <input type="text" id="kinks-input" placeholder="轻SM，足控，反差..." 
                                   class="w-full bg-gray-800 light:bg-white light:text-gray-900 px-4 py-4 rounded-3xl text-base focus:outline-none">
                        </div>
                        
                        <!-- 标签 -->
                        <div>
                            <label class="text-sm text-gray-400 mb-1 block">标签（多个用逗号分隔）</label>
                            <input type="text" id="tags-input" placeholder="妹妹，校园，日常..." 
                                   class="w-full bg-gray-800 light:bg-white light:text-gray-900 px-4 py-4 rounded-3xl text-base focus:outline-none">
                        </div>
                        
                        <!-- 人物描述 / 剧本描述（对应Supabase role_cards表的 personality + background） -->
                        <div>
                            <label class="text-sm text-gray-400 mb-1 block">角色定义 / 剧本描述</label>
                            <textarea id="description" rows="4" placeholder="身高165cm，长相甜美，穿着高中校服人..." 
                                      class="w-full bg-gray-800 light:bg-white light:text-gray-900 px-4 py-4 rounded-3xl text-base focus:outline-none resize-none"></textarea>
                        </div>
                        
                        <!-- 智能等级（示例） -->
                        <div>
                            <label class="text-sm text-gray-400 mb-1 block">智能等级</label>
                            <select id="ai-level" class="w-full bg-gray-800 light:bg-white light:text-gray-900 px-4 py-4 rounded-3xl text-base focus:outline-none">
                                <option value="2">2 - 普通</option>
                                <option value="3">3 - 高级</option>
                                <option value="4">4 - 智能</option>
                                <option value="5">5 - 顶级</option>
                            </select>
                        </div>
                        
                        <!-- 是否公开 -->
                        <div class="flex items-center justify-between bg-gray-800 light:bg-gray-100 px-4 py-4 rounded-3xl">
                            <span class="font-medium">是否公开（别人可查看/收藏）</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="is-public" checked class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-pink-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-pink-500"></div>
                            </label>
                        </div>
                        
                        <button type="submit" 
                                class="mt-auto bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-semibold py-4 rounded-3xl text-lg shadow-lg">
                            提交创建
                        </button>
                    </form>
                </div>
                
                <!-- 聊天页面 -->
                <div id="chat-page" class="hidden flex flex-col h-full">
                    <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-700 light:border-gray-200">
                        <button onclick="backToDiscover()" class="text-2xl">←</button>
                        <div id="chat-avatar" class="w-10 h-10 bg-pink-200 rounded-2xl overflow-hidden flex-shrink-0">
                            <!-- 头像 -->
                        </div>
                        <div>
                            <div id="chat-name" class="font-semibold"></div>
                            <div id="chat-status" class="text-xs text-green-400 flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>在线
                            </div>
                        </div>
                        <div class="ml-auto flex items-center text-pink-400 text-sm">
                            <span id="favorability" class="font-medium">好感度: +12</span>
                        </div>
                    </div>
                    
                    <!-- 聊天记录 -->
                    <div id="chat-messages" class="flex-1 overflow-auto p-4 space-y-4 bg-[radial-gradient(#1f2937_1px,#111827_1px)] bg-[length:20px_20px] light:bg-[radial-gradient(#e2e8f0_1px,#f8fafc_1px)]">
                        <!-- JS动态插入 -->
                    </div>
                    
                    <!-- 输入框 -->
                    <div class="p-3 border-t border-gray-700 light:border-gray-200 bg-gray-900 light:bg-white flex items-center gap-2">
                        <input id="chat-input" type="text" placeholder="输入你想说的话..." 
                               class="flex-1 bg-gray-800 light:bg-gray-100 light:text-gray-900 px-5 py-3 rounded-3xl focus:outline-none text-sm">
                        <button onclick="sendMessage()" 
                                class="w-12 h-12 bg-pink-500 rounded-3xl flex items-center justify-center text-white">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 底部导航栏 -->
            <div class="h-14 bg-gray-900 light:bg-white border-t border-gray-700 light:border-gray-200 flex items-center justify-around text-2xl text-gray-400">
                <div onclick="navigateTo(0)" class="nav-item active flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-house"></i><span class="text-[10px]">发现</span></div>
                <div onclick="navigateTo(1)" class="nav-item flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-comment-dots"></i><span class="text-[10px]">聊天</span></div>
                <div onclick="navigateTo(2)" class="nav-item flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-coins"></i><span class="text-[10px]">赚钱</span></div>
                <div onclick="navigateTo(3)" class="nav-item flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-fire"></i><span class="text-[10px]">创作</span></div>
                <div onclick="navigateTo(4)" class="nav-item flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-book"></i><span class="text-[10px]">相册</span></div>
                <div onclick="navigateTo(5)" class="nav-item flex flex-col items-center text-xs gap-px"><i class="fa-solid fa-user"></i><span class="text-[10px]">我的</span></div>
            </div>
        </div>
    </div>

    <script>
       let currentTheme = 'light'; // 默认浅色
    let currentRole = null;
    let roleCards = JSON.parse(localStorage.getItem('roleCards')) || [
        {
            id: 1, name: "Yuki", play_type: "养成", nsfw: true,
            description: "身高165cm，长相甜美，穿着高中校服，性格害羞黏人",
            tags: "妹妹,校园", avatar: "https://picsum.photos/id/1011/800/600",
            favorability: 12
        },
        {
            id: 2, name: "邻居太太", play_type: "剧本", nsfw: true,
            description: "39岁人妻，成熟魅力，喜欢在日常互动中慢慢释放",
            tags: "NSFW,成熟", avatar: "https://picsum.photos/id/1005/800/600",
            favorability: 0
        }
    ];

    function saveToLocal() {
        localStorage.setItem('roleCards', JSON.stringify(roleCards));
    }

    // ==================== 修复后的过滤函数 ====================
    function filterByType(btn) {
        const type = btn.dataset.type;   // ← 改这里
        document.querySelectorAll('.select-playtype').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        let filtered = roleCards;
        if (type !== 'all') {
            if (type === 'NSFW') {
                filtered = roleCards.filter(r => r.nsfw);
            } else {
                filtered = roleCards.filter(r => r.play_type === type);
            }
        }
        renderRoleList(filtered);
    }

    // ==================== 修复后的渲染函数 ====================
    function renderRoleList(filteredRoles) {
        const container = document.getElementById('role-list');
        container.innerHTML = '';

        filteredRoles.forEach(role => {   // ← 改成 filteredRoles
            const html = `
            <div onclick="openChat(${role.id})" class="role-card rounded-3xl overflow-hidden cursor-pointer shadow-lg">
                <div class="relative">
                    <img src="${role.avatar}" class="w-full h-64 object-cover rounded-t-3xl">
                    ${role.nsfw ? `<div class="absolute top-3 left-3 bg-orange-500 text-white text-xs px-3 py-1 rounded-2xl">NSFW</div>` : ''}
                    <div class="absolute top-3 right-3 ${role.play_type==='养成'?'bg-pink-500':'bg-purple-500'} text-white text-xs px-4 py-1 rounded-3xl">${role.play_type}</div>
                </div>
                <div class="p-4">
                    <div class="font-semibold text-lg">${role.name}</div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-3 mt-1">${role.description}</p>
                    <div class="flex items-center justify-between mt-4 text-xs">
                        <div class="flex items-center gap-1 text-pink-500">
                            <i class="fa-solid fa-heart"></i>
                            <span>${role.favorability}</span>
                        </div>
                        <div class="text-gray-400">${role.tags}</div>
                    </div>
                </div>
            </div>`;
            container.innerHTML += html;
        });

        if (filteredRoles.length === 0) {
            container.innerHTML = `<div class="col-span-2 py-12 text-center text-gray-400">暂无角色</div>`;
        }
    }
     // ==================== 实时时间更新 ====================
    function updateRealTimeClock() {
        const timeEl = document.getElementById('time');
        function refreshTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes}`;
        }
        refreshTime();                    // 立即显示当前时间
        setInterval(refreshTime, 60000);  // 每分钟更新一次
        
        // 筛选玩法类型（颜色已优化，更清晰）
        function filterByType(btn, type) {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            let filtered = roleCards;
            if (type !== 'all') {
                if (type === 'NSFW') filtered = roleCards.filter(r => r.nsfw);
                else filtered = roleCards.filter(r => r.play_type === type);
            }
            renderRoleList(filtered);
        }
        
        // 创建角色表单处理
        function handleCreateRole(e) {
            e.preventDefault();
            const newRole = {
                id: Date.now(),
                name: document.getElementById('role-name').value,
                play_type: document.getElementById('play-type').value,
                nsfw: document.getElementById('nsfw-toggle').checked,
                description: document.getElementById('description').value,
                tags: document.getElementById('tags-input').value,
                avatar: `https://picsum.photos/id/${Math.floor(Math.random()*900)}/800/600`,
                favorability: 0
            };
            roleCards.unshift(newRole);
            saveToLocal();
            alert('✅ 人物卡创建成功！');
            backToDiscover();
            renderRoleList(roleCards);
        }
        
        // 切换玩法类型（养成 / 剧本）
        function selectPlayType(el) {
            document.querySelectorAll('#create-page .select-playtype').forEach(e => e.style.borderColor = 'transparent');
            el.style.borderColor = '#c026d3';
            document.getElementById('play-type').value = el.dataset.value;
        }
        
        // NSFW 开关 → 显示性癖
        function toggleKinksField() {
            document.getElementById('kinks-field').classList.toggle('hidden', !document.getElementById('nsfw-toggle').checked);
        }
        
        
        // 打开聊天（支持养成类好感度变化）
        function openChat(id) {
            currentRole = roleCards.find(r => r.id === id);
            if (!currentRole) return;
            
            document.getElementById('discover-page').classList.add('hidden');
            document.getElementById('create-page').classList.add('hidden');
            const chatPage = document.getElementById('chat-page');
            chatPage.classList.remove('hidden');
            
            document.getElementById('chat-name').innerHTML = `${currentRole.name} <span class="text-xs text-gray-400 ml-2">${currentRole.play_type}</span>`;
            document.getElementById('chat-avatar').innerHTML = `<img src="${currentRole.avatar}" class="w-full h-full object-cover">`;
            
            // 清空消息
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = `
                <div class="flex justify-center text-xs text-gray-400 mb-4">今天 09:41</div>
                <div class="chat-bubble-ai px-4 py-3 max-w-[80%] ml-0">
                    嗯...很可爱。<span class="text-xs text-pink-400 ml-2">好感变化:+1</span>
                </div>`;
            
            document.getElementById('favorability').innerHTML = `好感度: <span class="text-pink-400">${currentRole.favorability}</span>`;
            
            // 如果是养成类，显示好感度提示
            if (currentRole.play_type === '养成') {
                console.log('%c[养成系统] 好感度系统已激活', 'color:#ec4899');
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentRole) return;
            
            const messagesContainer = document.getElementById('chat-messages');
            
            // 用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'flex justify-end';
            userMsg.innerHTML = `<div class="chat-bubble-me px-4 py-3 max-w-[75%]">${text}</div>`;
            messagesContainer.appendChild(userMsg);
            
            input.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // 模拟AI回复（使用xAI API占位）
            setTimeout(() => {
                let replyText = '嗯嗯～我听到了！';
                let favorChange = 0;
                
                if (currentRole.play_type === '养成') {
                    favorChange = Math.random() > 0.5 ? 1 : -1;
                    currentRole.favorability = Math.max(0, currentRole.favorability + favorChange);
                    document.getElementById('favorability').innerHTML = `好感度: <span class="text-pink-400">${currentRole.favorability}</span>`;
